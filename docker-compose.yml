services:
  postgres:
    image: postgres:16
    container_name: orderplatform-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: orderplatform
      POSTGRES_USER: orderplatform
      POSTGRES_PASSWORD: orderplatform
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
